<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analiza Repartitiei</title>
  <script src="https://cdn.jsdelivr.net/npm/shinylive@0.7.0/dist/shinylive.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shinylive@0.7.0/dist/shinylive.css" />
  <style>
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
    .shinylive-wrapper { width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <div class="shinylive-wrapper">
    <script type="text/r" data-engine="webr">
library(shiny)
library(ggplot2)
library(moments)

ui <- fluidPage(
  titlePanel("Analiza repartitiei pentru date numerice"),
  tags$head(tags$style(HTML("
    .btn-ai { background:#10a37f; color:white; border:none; width:100%;
              padding:8px; border-radius:4px; cursor:pointer; font-size:14px; margin-top:8px; }
    .btn-ai:hover { background:#0d8a6b; }
  "))),
  sidebarLayout(
    sidebarPanel(width=3,
      fileInput("file", "Incarca fisier CSV", accept=c(".csv","text/csv")),
      tags$small(tags$em("Separator: virgula sau punct-virgula")),
      hr(),
      uiOutput("column_selector"),
      hr(),
      numericInput("bins","Numar bin-uri histograma:",value=30,min=5,max=100),
      actionButton("analyze","Analizeaza distributia",class="btn-primary",width="100%"),
      hr(),
      uiOutput("ai_button_ui")
    ),
    mainPanel(width=9,
      tabsetPanel(
        tabPanel("Vizualizari",
          plotOutput("histogram_plot",height="450px"),
          plotOutput("qq_plot",height="350px")
        ),
        tabPanel("Teste statistice", verbatimTextOutput("test_results")),
        tabPanel("Distributii sugerate", verbatimTextOutput("distribution_suggestions")),
        tabPanel("Interpretare AI", uiOutput("ai_section"))
      )
    )
  )
)

server <- function(input, output, session) {
  analysis_done <- reactiveVal(FALSE)
  stats_text    <- reactiveVal("")

  data <- reactive({
    req(input$file)
    tryCatch({
      df <- tryCatch(read.csv(input$file$datapath, stringsAsFactors=FALSE), error=function(e) NULL)
      if (is.null(df) || ncol(df) <= 1)
        df <- read.csv2(input$file$datapath, stringsAsFactors=FALSE)
      df
    }, error=function(e){ showNotification(paste("Eroare:",e$message),type="error"); NULL })
  })

  output$column_selector <- renderUI({
    req(data())
    cols <- names(data())[sapply(data(), is.numeric)]
    if (length(cols)==0) return(p("Nu exista coloane numerice."))
    selectInput("column","Selecteaza coloana numerica:",choices=cols)
  })

  get_values <- reactive({
    req(data(), input$column)
    v <- data()[[input$column]]
    v[!is.na(v)]
  })

  output$ai_button_ui <- renderUI({
    req(analysis_done())
    url <- paste0("https://chatgpt.com/?q=", URLencode(stats_text(), reserved=TRUE))
    tags$a(href=url, target="_blank",
      tags$button("Interpreteaza cu ChatGPT", class="btn-ai"))
  })

  output$ai_section <- renderUI({
    if (!analysis_done()) return(p("Ruleaza mai intai analiza."))
    tagList(
      p("Apasa butonul din bara laterala â€” ChatGPT se deschide cu rezultatele."),
      hr(),
      p(tags$strong("Prompt trimis:")),
      tags$pre(style="white-space:pre-wrap;font-size:12px;background:#f0f9f5;padding:10px;border-radius:4px;",
        stats_text())
    )
  })

  observeEvent(input$analyze, {
    values <- get_values()
    req(length(values) >= 3)
    n <- length(values); m <- mean(values); med <- median(values)
    s <- sd(values); skew <- skewness(values); kurt <- kurtosis(values)
    mn <- min(values); mx <- max(values)

    output$histogram_plot <- renderPlot({
      ggplot(data.frame(x=values), aes(x=x)) +
        geom_histogram(aes(y=after_stat(density)), bins=input$bins, fill="steelblue", color="white", alpha=0.7) +
        geom_density(color="red", linewidth=1.2) +
        labs(title=paste("Histograma -",input$column), x=input$column, y="Densitate") +
        theme_minimal()
    })

    output$qq_plot <- renderPlot({
      ggplot(data.frame(sample=values), aes(sample=sample)) +
        stat_qq(color="steelblue", size=2) + stat_qq_line(color="red", linewidth=1.2) +
        labs(title=paste("Q-Q Plot -",input$column), x="Cuantile teoretice", y="Cuantile observate") +
        theme_minimal()
    })

    sw_text <- ""
    if (n >= 3 && n <= 5000) {
      sw <- shapiro.test(values)
      sw_text <- sprintf("Shapiro-Wilk: W=%.4f, p=%.4f (%s)", sw$statistic, sw$p.value,
        ifelse(sw$p.value > 0.05, "Normal", "Non-normal"))
    }
    ks <- ks.test(values, "pnorm", mean=m, sd=s)
    ks_text <- sprintf("Kolmogorov-Smirnov: D=%.4f, p=%.4f (%s)", ks$statistic, ks$p.value,
      ifelse(ks$p.value > 0.05, "Normal", "Non-normal"))

    dist_list <- c()
    if (abs(skew) < 0.5 && abs(kurt-3) < 0.5) dist_list <- c(dist_list,"NORMALA")
    if (skew > 0.5 && all(values > 0))          dist_list <- c(dist_list,"LOG-NORMALA")
    if (abs(skew-2) < 0.8 && all(values > 0))   dist_list <- c(dist_list,"EXPONENTIALA")
    if (skew > 0.3 && skew < 2 && all(values > 0)) dist_list <- c(dist_list,"GAMMA")
    if (all(values >= 0 & values <= 1))          dist_list <- c(dist_list,"BETA")
    if (length(dist_list)==0) dist_list <- "Analiza suplimentara necesara"

    output$test_results <- renderPrint({
      cat("=== STATISTICI DESCRIPTIVE ===\n")
      cat("  N:",n,"\n  Medie:",round(m,4),"\n  Mediana:",round(med,4),
          "\n  SD:",round(s,4),"\n  Skewness:",round(skew,4),
          "\n  Kurtosis:",round(kurt,4),"\n  Min:",round(mn,4),"Max:",round(mx,4),"\n\n")
      cat("=== TESTE DE NORMALITATE ===\n")
      cat(sw_text,"\n",ks_text,"\n")
    })

    output$distribution_suggestions <- renderPrint({
      cat("=== DISTRIBUTII SUGERATE ===\n")
      for (d in dist_list) cat(" *",d,"\n")
    })

    prompt <- paste0(
      "Sunt student si am rulat o analiza statistica in R.\n",
      "COLOANA: ",input$column,"\n",
      "N=",n,", Medie=",round(m,4),", Mediana=",round(med,4),
      ", SD=",round(s,4),", Skewness=",round(skew,4),", Kurtosis=",round(kurt,4),"\n",
      "Min=",round(mn,4),", Max=",round(mx,4),"\n",
      sw_text,"\n",ks_text,"\n",
      "Distributii sugerate: ",paste(dist_list,collapse=", "),"\n\n",
      "Te rog: 1) explica skewness si kurtosis; 2) interpreteaza testele; ",
      "3) confirma distributiile; 4) recomanda metode statistice potrivite."
    )
    stats_text(prompt)
    analysis_done(TRUE)
    showNotification("Analiza completa!", type="message")
  })
}

shinyApp(ui, server)
    </script>
  </div>
</body>
</html>

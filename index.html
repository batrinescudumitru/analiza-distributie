<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analiza Repartiției — WebR</title>

  <!-- Shinylive CSS & JS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shinylive@0.5.0/dist/shinylive.css">
  <script src="https://cdn.jsdelivr.net/npm/shinylive@0.5.0/dist/shinylive.js"></script>

  <style>
    body { margin: 0; padding: 0; background: #f5f5f5; }
    #loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100vh;
      font-family: Arial, sans-serif; color: #555;
    }
    .spinner {
      width: 50px; height: 50px; border: 5px solid #ddd;
      border-top-color: #2c7be5; border-radius: 50%;
      animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #app { display: none; }
    #shinylive-container { width: 100%; height: 100vh; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <h2>🔬 Se încarcă aplicația...</h2>
  <p>Prima încărcare durează ~30 secunde (WebR descarcă mediul R)</p>
</div>

<div id="app">
  <div id="shinylive-container"></div>
</div>

<script type="text/javascript">
  // Codul aplicației R (app.R)
  const appCode = `
library(shiny)
library(ggplot2)
library(moments)

ui <- fluidPage(
  titlePanel("Analiza repartitiei pentru date numerice"),
  tags$head(tags$style(HTML("
    .btn-ai { background-color: #10a37f; color: white; border: none; }
    .btn-ai:hover { background-color: #0d8a6b; color: white; }
  "))),
  sidebarLayout(
    sidebarPanel(
      width = 3,
      fileInput("file", "Incarca fisier CSV", accept = c(".csv", "text/csv")),
      tags$small(tags$em("Fisierul trebuie sa fie CSV")),
      hr(),
      uiOutput("column_selector"),
      hr(),
      numericInput("bins", "Numar bin-uri histograma:", value = 30, min = 5, max = 100),
      actionButton("analyze", "Analizeaza distributia", class = "btn-primary", width = "100%"),
      hr(),
      uiOutput("ai_button_ui")
    ),
    mainPanel(
      width = 9,
      tabsetPanel(
        tabPanel("Vizualizari",
          plotOutput("histogram_plot", height = "500px"),
          plotOutput("qq_plot", height = "400px")
        ),
        tabPanel("Teste statistice", verbatimTextOutput("test_results")),
        tabPanel("Distributii sugerate", verbatimTextOutput("distribution_suggestions")),
        tabPanel("Interpretare AI", uiOutput("ai_section"))
      )
    )
  )
)

server <- function(input, output, session) {
  analysis_done <- reactiveVal(FALSE)
  stats_text    <- reactiveVal("")

  data <- reactive({
    req(input$file)
    tryCatch({
      df <- tryCatch(
        read.csv(input$file$datapath, stringsAsFactors = FALSE),
        error = function(e) NULL
      )
      if (is.null(df) || ncol(df) <= 1) {
        df <- read.csv2(input$file$datapath, stringsAsFactors = FALSE)
      }
      df
    }, error = function(e) {
      showNotification(paste("Eroare:", e$message), type = "error")
      NULL
    })
  })

  output$column_selector <- renderUI({
    req(data())
    df <- data()
    numeric_cols <- names(df)[sapply(df, is.numeric)]
    if (length(numeric_cols) == 0) return(p("Nu exista coloane numerice."))
    selectInput("column", "Selecteaza coloana numerica:", choices = numeric_cols)
  })

  get_values <- reactive({
    req(data(), input$column)
    df <- data()
    values <- df[[input$column]]
    values[!is.na(values)]
  })

  output$ai_button_ui <- renderUI({
    req(analysis_done())
    prompt_enc <- URLencode(stats_text(), reserved = TRUE)
    url <- paste0("https://chatgpt.com/?q=", prompt_enc)
    tags$a(
      href = url, target = "_blank",
      tags$button("Interpreteaza cu ChatGPT",
                  class = "btn btn-block btn-ai",
                  style = "width:100%; margin-top:5px;")
    )
  })

  output$ai_section <- renderUI({
    if (!analysis_done()) {
      return(p("Ruleaza mai intai analiza, apoi apasa butonul de interpretare AI."))
    }
    tagList(
      p("Apasa butonul din bara laterala pentru a deschide ChatGPT cu rezultatele pre-completate."),
      hr(),
      p(tags$strong("Prompt care va fi trimis:")),
      tags$pre(style = "white-space: pre-wrap; font-size: 12px;", stats_text())
    )
  })

  observeEvent(input$analyze, {
    values <- get_values()
    req(length(values) >= 3)

    n    <- length(values)
    m    <- mean(values)
    med  <- median(values)
    s    <- sd(values)
    skew <- skewness(values)
    kurt <- kurtosis(values)
    mn   <- min(values)
    mx   <- max(values)

    output$histogram_plot <- renderPlot({
      df_plot <- data.frame(x = values)
      ggplot(df_plot, aes(x = x)) +
        geom_histogram(aes(y = after_stat(density)),
                       bins = input$bins, fill = "steelblue", color = "white", alpha = 0.7) +
        geom_density(color = "red", linewidth = 1.2) +
        labs(title = paste("Histograma -", input$column), x = input$column, y = "Densitate") +
        theme_minimal()
    })

    output$qq_plot <- renderPlot({
      df_plot <- data.frame(sample = values)
      ggplot(df_plot, aes(sample = sample)) +
        stat_qq(color = "steelblue", size = 2) +
        stat_qq_line(color = "red", linewidth = 1.2) +
        labs(title = paste("Q-Q Plot -", input$column),
             x = "Cuantile teoretice", y = "Cuantile observate") +
        theme_minimal()
    })

    sw_text <- ""
    if (n >= 3 && n <= 5000) {
      sw <- shapiro.test(values)
      sw_text <- sprintf("Shapiro-Wilk: W=%.4f, p=%.4f (%s)",
        sw$statistic, sw$p.value,
        ifelse(sw$p.value > 0.05, "Normal", "Non-normal"))
    }
    ks <- ks.test(values, "pnorm", mean = m, sd = s)
    ks_text <- sprintf("Kolmogorov-Smirnov: D=%.4f, p=%.4f (%s)",
      ks$statistic, ks$p.value,
      ifelse(ks$p.value > 0.05, "Normal", "Non-normal"))

    dist_list <- c()
    if (abs(skew) < 0.5 && abs(kurt - 3) < 0.5) dist_list <- c(dist_list, "NORMALA")
    if (skew > 0.5 && all(values > 0))           dist_list <- c(dist_list, "LOG-NORMALA")
    if (abs(skew - 2) < 0.8 && all(values > 0))  dist_list <- c(dist_list, "EXPONENTIALA")
    if (skew > 0.3 && skew < 2 && all(values > 0)) dist_list <- c(dist_list, "GAMMA")
    if (all(values >= 0 & values <= 1))           dist_list <- c(dist_list, "BETA")
    if (length(dist_list) == 0) dist_list <- "Analiza suplimentara necesara"

    output$test_results <- renderPrint({
      cat("=== STATISTICI DESCRIPTIVE ===\\n")
      cat("  N:", n, "\\n")
      cat("  Medie:", round(m, 4), "\\n")
      cat("  Mediana:", round(med, 4), "\\n")
      cat("  SD:", round(s, 4), "\\n")
      cat("  Skewness:", round(skew, 4), "\\n")
      cat("  Kurtosis:", round(kurt, 4), "\\n")
      cat("  Min:", round(mn, 4), "Max:", round(mx, 4), "\\n\\n")
      cat("=== TESTE DE NORMALITATE ===\\n")
      cat(sw_text, "\\n")
      cat(ks_text, "\\n")
    })

    output$distribution_suggestions <- renderPrint({
      cat("=== DISTRIBUTII SUGERATE ===\\n")
      for (d in dist_list) cat("  *", d, "\\n")
    })

    prompt <- paste0(
      "Sunt student si am rulat o analiza statistica a distributiei unui set de date in R. ",
      "Te rog sa interpretezi rezultatele de mai jos in termeni simpli.\\n\\n",
      "COLOANA: ", input$column, "\\n",
      "N=", n, ", Medie=", round(m,4), ", Mediana=", round(med,4),
      ", SD=", round(s,4), ", Skewness=", round(skew,4),
      ", Kurtosis=", round(kurt,4), "\\n",
      sw_text, "\\n", ks_text, "\\n",
      "Distributii sugerate: ", paste(dist_list, collapse=", "), "\\n\\n",
      "Te rog: 1) explica skewness si kurtosis; 2) interpreteaza testele de normalitate; ",
      "3) confirma distributiile sugerate; 4) recomanda metode statistice potrivite."
    )

    stats_text(prompt)
    analysis_done(TRUE)
    showNotification("Analiza completa!", type = "message")
  })
}

shinyApp(ui, server)
`;

  // Inițializare Shinylive
  async function initApp() {
    try {
      await shinylive.run({
        language: "r",
        code: appCode,
        container: document.getElementById("shinylive-container"),
        packages: ["ggplot2", "moments"],
        onReady: function() {
          document.getElementById("loading").style.display = "none";
          document.getElementById("app").style.display = "block";
        }
      });
    } catch (err) {
      document.getElementById("loading").innerHTML =
        '<p style="color:red;">❌ Eroare la încărcare: ' + err.message + '</p>';
    }
  }

  window.addEventListener("load", initApp);
</script>
</body>
</html>
